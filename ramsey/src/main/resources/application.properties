spring.application.name=ramsey
server.port=8080

# Max upload size — bump as needed for large scanned PDFs
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=50MB

# ---- Tesseract configuration ----
# Directory containing the trained data files (e.g. eng.traineddata).
# On Linux this is typically /usr/share/tesseract-ocr/5/tessdata or /usr/share/tessdata
# Override via env var TESSDATA_PREFIX or this property at runtime, e.g.:
#   java -jar ramsey.jar --ocr.tessdata-path=/usr/share/tesseract-ocr/5/tessdata
ocr.tessdata-path=${TESSDATA_PREFIX:/usr/share/tesseract-ocr/5/tessdata}

# Language(s) tesseract should use, e.g. "eng" or "eng+fra"
ocr.language=${OCR_LANGUAGE:eng}

# DPI used when rasterizing PDF pages for OCR (higher = more accurate, slower)
ocr.pdf-render-dpi=300

# If a PDF page's native extracted text has fewer than this many characters,
# treat it as a scanned/image page and run OCR on it instead.
ocr.pdf-min-text-length-per-page=20

logging.level.com.athen.ramsey=INFO

# ---- MongoDB (local instance) ----
# Note: Spring Boot 4 moved connection properties from spring.data.mongodb.* to spring.mongodb.*
spring.mongodb.host=${MONGO_HOST:localhost}
spring.mongodb.port=${MONGO_PORT:27017}
spring.mongodb.database=${MONGO_DATABASE:ramsey_db}
# If your local Mongo requires auth, use a full URI instead and comment out the three lines above:
# spring.mongodb.uri=mongodb://username:password@localhost:27017/ramsey_db?authSource=admin

# ---- LLM (structured extraction) ----
# Which provider is used by default when the request doesn't override it: openai | gemini | ollama
llm.provider=${LLM_PROVIDER:openai}
llm.timeout-seconds=${LLM_TIMEOUT_SECONDS:60}

llm.openai.api-key=${OPENAI_API_KEY:}
llm.openai.base-url=${OPENAI_BASE_URL:https://api.openai.com/v1}
llm.openai.model=${OPENAI_MODEL:gpt-4o-mini}
llm.openai.temperature=${OPENAI_TEMPERATURE:0.2}

llm.gemini.api-key=${GEMINI_API_KEY:}
llm.gemini.base-url=${GEMINI_BASE_URL:https://generativelanguage.googleapis.com/v1beta}
llm.gemini.model=${GEMINI_MODEL:gemini-1.5-flash}

llm.ollama.base-url=${OLLAMA_BASE_URL:http://localhost:11434}
llm.ollama.model=${OLLAMA_MODEL:llama3.1}

